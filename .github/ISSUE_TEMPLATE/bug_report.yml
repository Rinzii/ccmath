name: Bug Report
description: Report incorrect results, build failures, or other defects in ccmath
title: '[BUG]: '
labels: ['T: Bugfix', 'S: Untriaged']
body:
  - type: checkboxes
    attributes:
      label: Due diligence
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I reproduced this against the latest main (or a tagged release)
          required: true

  - type: input
    id: function
    attributes:
      label: Affected function(s)
      description: 'The ccm:: function(s) involved.'
      placeholder: ccm::pow, ccm::sin
    validations:
      required: true

  - type: dropdown
    id: family
    attributes:
      label: Function family
      options:
        - basic
        - compare
        - expo
        - fmanip
        - hyper
        - misc
        - nearest
        - power
        - special
        - trig
        - not sure
    validations:
      required: true

  - type: dropdown
    id: code-path
    attributes:
      label: Code path
      description: Where the wrong result comes from. Select all that apply.
      multiple: true
      options:
        - constexpr (compile-time)
        - runtime (scalar kernel)
        - SIMD (vectorized)
        - deterministic mode (CCMATH_ENABLE_DETERMINISTIC)
        - not sure
    validations:
      required: true

  - type: dropdown
    id: scalar-type
    attributes:
      label: Scalar type
      options:
        - float
        - double
        - long double
        - integral
        - multiple / not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What is wrong, in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Input value(s)
      description: Exact inputs. Prefer hex float so no precision is lost.
      placeholder: 'x = 0x1.0000000000001p+0 (1.0000000000000002)'
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Expected result (and source of truth)
      placeholder: '0x1.5bf0a8b145769p+1, per MPFR / the C++ standard'
    validations:
      required: true

  - type: input
    id: actual
    attributes:
      label: Actual result
      placeholder: '0x1.5bf0a8b14576ap+1 (1 ULP high)'
    validations:
      required: true

  - type: input
    id: error
    attributes:
      label: Error magnitude (ULP) if known
    validations:
      required: false

  - type: dropdown
    id: rounding-mode
    attributes:
      label: Rounding mode
      options:
        - FE_TONEAREST (default)
        - FE_DOWNWARD
        - FE_UPWARD
        - FE_TOWARDZERO
        - unchanged / not sure
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A self-contained snippet. A Godbolt link is ideal. Print exact bits, not via raw std::cout.
      render: cpp
      placeholder: |
        #include <cstdio>
        #include <ccmath/ccmath.hpp>
        int main() {
          printf("%a\n", ccm::sqrt(4.0)); // expected 0x1p+1
        }
    validations:
      required: true

  - type: markdown
    attributes:
      value: '## Environment'

  - type: input
    id: ccmath-version
    attributes:
      label: ccmath version or commit
      placeholder: v0.2.0 or commit 65cb8ba9
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler and version
      placeholder: Clang 18.1.0
    validations:
      required: true

  - type: dropdown
    id: cpp-standard
    attributes:
      label: C++ standard
      options:
        - 'C++17'
        - 'C++20'
        - 'C++23'
        - 'C++26'
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - x86-64
        - x86
        - AArch64 / ARM
        - RISC-V
        - other
    validations:
      required: true

  - type: input
    id: opt-level
    attributes:
      label: Optimization level and relevant flags
      placeholder: '-O2 -ffp-contract=fast'
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Ubuntu 24.04
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
