name: ci-windows

on:
  push:
    tags-ignore:
      - v*.*
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install clang-format
        uses: aminya/setup-cpp@1f17f92d6a52bfcb1a25348e2c526c2e5cbb1134 # v1.8.0
        with:
          clangformat: 20.1.8

      - name: Check clang-format
        run: bash tools/ensure_format.sh
        shell: bash

  build-cxx17:
    needs: format
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: vs22-debug-cxx17
            configurePreset: vs22-debug
            buildPreset: build-vs22-debug
            testPreset: test-vs22-debug
            cxx_version: 17

          - name: vs22-release-cxx17
            configurePreset: vs22-release
            buildPreset: build-vs22-release
            testPreset: test-vs22-release
            cxx_version: 17

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cache build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ./**/CMakeFiles
            ./**/CMakeCache.txt
            ./**/out
          key: ${{ runner.os }}-${{ matrix.name }}

      - name: Configure
        run: >
          cmake --preset="${{ matrix.configurePreset }}"
          -DCCMATH_DESIRED_CXX_STANDARD="cxx_std_${{ matrix.cxx_version }}"
          -DCCMATH_ENABLE_AGGRESSIVE_WARNINGS=ON
          -DCCMATH_ENABLE_WARNINGS_AS_ERRORS=ON
          -DCCMATH_BUILD_SIMPLE_TESTS=ON
          -DCCMATH_BUILD_RIGOROUS_TESTS=OFF
          -DCCMATH_ENABLE_MPFR_TESTS=OFF
          -DCCMATH_ENABLE_POW_SEARCH_TOOLS=OFF

      - name: Build
        run: cmake --build --preset="${{ matrix.buildPreset }}"

      - name: Test
        run: ctest --preset="${{ matrix.testPreset }}" --output-on-failure --schedule-random -L simple -F

  build-cxx20:
    needs: build-cxx17
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: vs22-debug-cxx20
            configurePreset: vs22-debug
            buildPreset: build-vs22-debug
            testPreset: test-vs22-debug
            cxx_version: 20

          - name: vs22-release-cxx20
            configurePreset: vs22-release
            buildPreset: build-vs22-release
            testPreset: test-vs22-release
            cxx_version: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cache build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ./**/CMakeFiles
            ./**/CMakeCache.txt
            ./**/out
          key: ${{ runner.os }}-${{ matrix.name }}

      - name: Configure
        run: >
          cmake --preset="${{ matrix.configurePreset }}"
          -DCCMATH_DESIRED_CXX_STANDARD="cxx_std_${{ matrix.cxx_version }}"
          -DCCMATH_ENABLE_AGGRESSIVE_WARNINGS=ON
          -DCCMATH_ENABLE_WARNINGS_AS_ERRORS=ON
          -DCCMATH_BUILD_SIMPLE_TESTS=ON
          -DCCMATH_BUILD_RIGOROUS_TESTS=OFF
          -DCCMATH_ENABLE_MPFR_TESTS=OFF
          -DCCMATH_ENABLE_POW_SEARCH_TOOLS=OFF

      - name: Build
        run: cmake --build --preset="${{ matrix.buildPreset }}"

      - name: Test
        run: ctest --preset="${{ matrix.testPreset }}" --output-on-failure --schedule-random -L simple -F
