name: lint

on:
  push:
    tags-ignore:
      - v*.*
    branches:
      - '*'
    paths:
      - '.clang-format'
      - '.github/actions/install-clang-format/**'
      - '.github/workflows/lint.yml'
      - 'include/**/*.hpp'
      - 'tools/apply_format.sh'
      - 'tools/clang_format_version'
      - 'tools/ensure_format.sh'
  pull_request:
    branches:
      - '*'
    paths:
      - '.clang-format'
      - '.github/actions/install-clang-format/**'
      - '.github/workflows/lint.yml'
      - 'include/**/*.hpp'
      - 'tools/apply_format.sh'
      - 'tools/clang_format_version'
      - 'tools/ensure_format.sh'

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format_check:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/install-clang-format

      - name: Check clang-format
        run: bash tools/ensure_format.sh

  format_autofix:
    if: github.event_name == 'push'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: ./.github/actions/install-clang-format

      - name: Check clang-format
        id: check_format
        run: bash tools/ensure_format.sh
        continue-on-error: true

      - name: Apply clang-format
        if: steps.check_format.outcome == 'failure'
        run: bash tools/apply_format.sh

      - name: Commit clang-format fixes
        if: steps.check_format.outcome == 'failure'
        run: |
          if git diff --quiet -- include; then
            echo "No formatting changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add include
          git commit -m "ci: apply clang-format"
          git push origin HEAD:${{ github.ref_name }}

      - name: Verify clang-format after auto-fix
        if: steps.check_format.outcome == 'failure'
        run: bash tools/ensure_format.sh
