name: lint

on:
  pull_request:
    paths:
      - '**.hpp'

permissions:
  contents: write
  pull-requests: write

jobs:
  format_code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang-format
        uses: aminya/setup-cpp@3aac37c3fbde6cb1d2fa0a0a7e945b63b10561d5 # v1.1.0
        with:
          clangformat: 17.0.5

      - name: Apply clang-format
        run: find include -name '*.hpp' | xargs clang-format -i -style=file -fallback-style=none

      - name: Commit and push format fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add include
          if git diff --staged --quiet; then
            echo "Formatting is up to date."
            exit 0
          fi

          git commit -m "Apply clang-format."
          if git push origin "HEAD:${{ github.head_ref }}"; then
            exit 0
          fi

          FORMAT_BRANCH="ci/clang-format-pr-${{ github.event.pull_request.number }}"
          git push --force origin "HEAD:${FORMAT_BRANCH}"
          if gh pr list --head "${FORMAT_BRANCH}" --base "${{ github.head_ref }}" --json number --jq 'length' | grep -qv '^0$'; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body "clang-format updates are on \`${FORMAT_BRANCH}\`. Merge the open formatting PR into \`${{ github.head_ref }}\`."
          else
            gh pr create \
              --base "${{ github.head_ref }}" \
              --head "${FORMAT_BRANCH}" \
              --title "Apply clang-format." \
              --body "Auto formatting for PR #${{ github.event.pull_request.number }}."
          fi
