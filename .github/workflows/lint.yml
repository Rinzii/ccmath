name: lint

on:
  pull_request:
    paths:
      - '**.hpp'

permissions:
  contents: write

jobs:
  format_code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang-format
        uses: aminya/setup-cpp@1f17f92d6a52bfcb1a25348e2c526c2e5cbb1134 # v1.8.0
        with:
          clangformat: 20.1.8

      - name: Ensure clang-format
        run: bash tools/ensure_format.sh

      - name: Commit and push format fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add include
          if git diff --staged --quiet; then
            echo "Formatting is up to date."
            exit 0
          fi

          git commit -m "Apply clang-format"
          git push origin "HEAD:${{ github.head_ref }}"
