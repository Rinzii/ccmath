# Path-based labels applied by .github/workflows/labeler-pr.yml (actions/labeler).
# Helper file for that workflow. Does nothing on its own.

"A: Basic":
    - changed-files:
          - any-glob-to-any-file:
                - "**/basic/**"
                - "**/basic.hpp"

"A: Compare":
    - changed-files:
          - any-glob-to-any-file:
                - "**/compare/**"
