                - "docs/proofs/**"
                - "docs/approximating_functions/sollya/**"
                - "docs/approximating_functions/gappa/**"

"T: Tests":
    - changed-files:
          - any-glob-to-any-file:
                - "tests/**"

"T: Documentation":
    - changed-files:
          - any-glob-to-any-file:
                - "**/*.md"
                - "docs/**"

"Changes: Public API":
    - changed-files:
          - any-glob-to-any-file:
                - "include/ccmath/*.hpp"
                - "include/ccmath/math/**"
                - "include/ccmath/ext/**"
